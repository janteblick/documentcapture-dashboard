<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings — DocumentCapture Dashboard</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1>Settings</h1>

    <section>
      <h2>Credentials</h2>

      <label for="username">Username</label>
      <input type="text" id="username" placeholder="DOMAIN\username" autocomplete="username">

      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password">

      <label for="remember">Remember credentials</label>
      <select id="remember">
        <option value="1">1 day</option>
        <option value="7" selected>7 days</option>
        <option value="30">30 days</option>
        <option value="0">Always</option>
      </select>

      <label for="refresh-interval">Auto-refresh interval</label>
      <select id="refresh-interval">
        <option value="1">Every minute</option>
        <option value="5" selected>Every 5 minutes</option>
        <option value="15">Every 15 minutes</option>
        <option value="30">Every 30 minutes</option>
      </select>
    </section>

    <div class="actions">
      <button id="save">Save</button>
    </div>

    <div id="status" class="status hidden"></div>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
